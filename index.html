<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>麻雀战法 · 智能全自动雷达</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-gold: #d4af37;
            --text-main: #ffffff;
            --text-muted: #8a8d99;
            --red-down: #ff4d4f;
            --green-up: #2ed573;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        /* 交易纪律跑马灯 */
        .discipline-bar {
            width: 100%;
            background: rgba(255, 77, 79, 0.15);
            border-bottom: 1px solid var(--red-down);
            color: var(--red-down);
            font-size: 13px;
            font-weight: bold;
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            z-index: 999;
        }
        .marquee {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
        
        .container { width: 100%; max-width: 430px; padding: 12px; }
        h1 { font-size: 20px; font-weight: 600; color: var(--accent-gold); margin-bottom: 4px; text-align: center; }
        .subtitle { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 12px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1px solid #262938; }
        
        /* 扫描器容器层 */
        .screener-container { width: 100%; height: 360px; border-radius: 12px; overflow: hidden; background: #131722; }

        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .currency { position: absolute; left: 14px; color: var(--text-muted); font-size: 16px; }
        input {
            width: 100%;
            background: #202330;
            border: 1px solid #2d3142;
            border-radius: 10px;
            padding: 10px 14px 10px 32px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: var(--accent-gold); }
        
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #202330; }
        .result-row:last-child { border-bottom: none; }
        .result-label { font-size: 13px; color: var(--text-muted); }
        .result-value { font-size: 18px; font-weight: 700; font-family: monospace; }
        .value-loss { color: var(--red-down); }
        .value-profit { color: var(--green-up); }
    </style>
</head>
<body>

<div class="discipline-bar">
    <div class="marquee">⚠️ 交易纪律至上：坚决执行系统信号！杜绝抗单！杜绝凭感觉加仓！保护本金是生存的第一要务！ ⚠️</div>
</div>

<div class="container">
    <h1>麻雀战法 · 智能全自动雷达</h1>
    <div class="subtitle">热门美股 实时全自动突破监控</div>

    <div class="card">
        <div style="font-size: 13px; color: var(--accent-gold); font-weight: 600; margin-bottom: 8px;">
            ⚡ 热门知名美股实时监控榜 (非仙股)
        </div>
        <div class="screener-container">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                {
                "width": "100%",
                "height": "100%",
                "symbolsGroups": [
                  {
                    "name": "多头动量监控组",
                    "symbols": [
                      {"symbol": "NASDAQ:NVDA", "displayName": "英伟达"},
                      {"symbol": "NASDAQ:TSLA", "displayName": "特斯拉"},
                      {"symbol": "NASDAQ:AAPL", "displayName": "苹果"},
                      {"symbol": "NASDAQ:AMD", "displayName": "AMD"},
                      {"symbol": "NASDAQ:AMZN", "displayName": "亚马逊"},
                      {"symbol": "NASDAQ:META", "displayName": "META"},
                      {"symbol": "NASDAQ:MSFT", "displayName": "微软"},
                      {"symbol": "NYSE:BABA", "displayName": "阿里巴巴"}
                    ]
                  }
                ],
                "showSymbolLogo": true,
                "colorTheme": "dark",
                "isTransparent": true,
                "locale": "zh_CN"
                }
                </script>
            </div>
        </div>
        <p style="font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.4;">
            💡 **实战用法**：点击列表中的股票，可以直接看它们的涨跌幅。配合 1M 走势，当发现高动量标的突然放量拉升，即可选择跟进！
        </p>
    </div>

    <div class="card">
        <div class="input-group">
            <label for="price">输入：当前入场单股价格 (Cost Price)</label>
            <div class="input-wrapper">
                <span class="currency">$</span>
                <input type="number" id="price" placeholder="0.00" step="0.0001" oninput="calculate()">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="result-row">
            <span class="result-label">🛑 单股硬为止损价 (-1.5%)</span>
            <span class="result-value value-loss" id="loss-val">$0.000</span>
        </div>
        <div class="result-row">
            <span class="result-label">🎯 单股自动止盈价 (+3.0%)</span>
            <span class="result-value value-profit" id="profit-val">$0.000</span>
        </div>
    </div>

</div>

<script>
function calculate() {
    const price = parseFloat(document.getElementById('price').value);
    if (isNaN(price) || price <= 0) {
        document.getElementById('loss-val').innerText = '$0.000';
        document.getElementById('profit-val').innerText = '$0.000';
        return;
    }
    const lossPrice = price * 0.985;   // -1.5%
    const profitPrice = price * 1.03;  // +3.0%
    document.getElementById('loss-val').innerText = '$' + lossPrice.toFixed(3);
    document.getElementById('profit-val').innerText = '$' + profitPrice.toFixed(3);
}
</script>

</body>
</html>
